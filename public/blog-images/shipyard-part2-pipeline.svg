<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 480" style="background:#0f172a; font-family:Inter, system-ui, sans-serif;">
  <!-- Title -->
  <text x="450" y="40" text-anchor="middle" fill="#f1f5f9" font-size="18" font-weight="600">ML CI/CD Pipeline</text>
  <text x="450" y="62" text-anchor="middle" fill="#94a3b8" font-size="13">From code commit to production serving</text>

  <!-- Step 1: Code Commit -->
  <rect x="30" y="100" width="130" height="80" rx="8" fill="#1e293b" stroke="#334155" stroke-width="1.5"/>
  <text x="95" y="130" text-anchor="middle" fill="#06b6d4" font-size="12" font-weight="600">1. Code Commit</text>
  <text x="95" y="150" text-anchor="middle" fill="#94a3b8" font-size="10">Git push</text>
  <text x="95" y="165" text-anchor="middle" fill="#94a3b8" font-size="10">Pull request</text>

  <!-- Arrow -->
  <line x1="160" y1="140" x2="196" y2="140" stroke="#334155" stroke-width="2"/>
  <polygon points="196,135 206,140 196,145" fill="#334155"/>

  <!-- Step 2: Automated Tests -->
  <rect x="206" y="100" width="130" height="80" rx="8" fill="#1e293b" stroke="#334155" stroke-width="1.5"/>
  <text x="271" y="127" text-anchor="middle" fill="#06b6d4" font-size="12" font-weight="600">2. Auto Tests</text>
  <text x="271" y="147" text-anchor="middle" fill="#94a3b8" font-size="10">Unit tests</text>
  <text x="271" y="162" text-anchor="middle" fill="#94a3b8" font-size="10">Data validation</text>
  <text x="271" y="177" text-anchor="middle" fill="#94a3b8" font-size="10">Model eval</text>

  <!-- Arrow -->
  <line x1="336" y1="140" x2="372" y2="140" stroke="#334155" stroke-width="2"/>
  <polygon points="372,135 382,140 372,145" fill="#334155"/>

  <!-- Step 3: Build Container -->
  <rect x="382" y="100" width="130" height="80" rx="8" fill="#1e293b" stroke="#334155" stroke-width="1.5"/>
  <text x="447" y="127" text-anchor="middle" fill="#06b6d4" font-size="12" font-weight="600">3. Build Image</text>
  <text x="447" y="147" text-anchor="middle" fill="#94a3b8" font-size="10">Docker build</text>
  <text x="447" y="162" text-anchor="middle" fill="#94a3b8" font-size="10">ECR push</text>
  <text x="447" y="177" text-anchor="middle" fill="#94a3b8" font-size="10">Version tag</text>

  <!-- Arrow -->
  <line x1="512" y1="140" x2="548" y2="140" stroke="#334155" stroke-width="2"/>
  <polygon points="548,135 558,140 548,145" fill="#334155"/>

  <!-- Step 4: Staging -->
  <rect x="558" y="100" width="130" height="80" rx="8" fill="#1e293b" stroke="#334155" stroke-width="1.5"/>
  <text x="623" y="127" text-anchor="middle" fill="#06b6d4" font-size="12" font-weight="600">4. Staging</text>
  <text x="623" y="147" text-anchor="middle" fill="#94a3b8" font-size="10">Integration test</text>
  <text x="623" y="162" text-anchor="middle" fill="#94a3b8" font-size="10">Shadow traffic</text>
  <text x="623" y="177" text-anchor="middle" fill="#94a3b8" font-size="10">Snitch check</text>

  <!-- Arrow -->
  <line x1="688" y1="140" x2="724" y2="140" stroke="#334155" stroke-width="2"/>
  <polygon points="724,135 734,140 724,145" fill="#334155"/>

  <!-- Step 5: Production -->
  <rect x="734" y="100" width="130" height="80" rx="8" fill="#1e293b" stroke="#06b6d4" stroke-width="2"/>
  <text x="799" y="127" text-anchor="middle" fill="#06b6d4" font-size="12" font-weight="600">5. Production</text>
  <text x="799" y="147" text-anchor="middle" fill="#94a3b8" font-size="10">Canary deploy</text>
  <text x="799" y="162" text-anchor="middle" fill="#94a3b8" font-size="10">Full rollout</text>
  <text x="799" y="177" text-anchor="middle" fill="#94a3b8" font-size="10">Monitoring</text>

  <!-- Snitch box -->
  <rect x="200" y="250" width="500" height="100" rx="8" fill="#1e293b" stroke="#334155" stroke-width="1.5" stroke-dasharray="6,3"/>
  <text x="450" y="278" text-anchor="middle" fill="#94a3b8" font-size="12" font-weight="600">🔍 Snitch — Automated Adherence Tool</text>
  <text x="450" y="300" text-anchor="middle" fill="#94a3b8" font-size="11">Watches every stage of the pipeline for compliance violations</text>
  <text x="450" y="318" text-anchor="middle" fill="#94a3b8" font-size="11">Enforces metadata standards · Tracks lineage · Alerts on deviations</text>

  <!-- Connector from pipeline stages to Snitch -->
  <line x1="271" y1="180" x2="271" y2="250" stroke="#334155" stroke-width="1" stroke-dasharray="4,3"/>
  <line x1="447" y1="180" x2="447" y2="250" stroke="#334155" stroke-width="1" stroke-dasharray="4,3"/>
  <line x1="623" y1="180" x2="623" y2="250" stroke="#334155" stroke-width="1" stroke-dasharray="4,3"/>

  <!-- Git Model Registry -->
  <rect x="200" y="390" width="500" height="60" rx="8" fill="#1e293b" stroke="#334155" stroke-width="1.5"/>
  <text x="450" y="416" text-anchor="middle" fill="#e2e8f0" font-size="12" font-weight="600">Git Model Registry</text>
  <text x="450" y="436" text-anchor="middle" fill="#94a3b8" font-size="11">All model artifacts versioned in Git · Immutable audit trail · PR-based promotion</text>

  <!-- Footer note -->
  <text x="450" y="470" text-anchor="middle" fill="#475569" font-size="11">Originally published: Interos Engineering — medium.com/interos-engineering</text>
</svg>
